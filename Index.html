<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/Estilos.css">
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="box p-4">
        <h1 class="text-center mb-4">Todo List</h1>
        <div class="input-group mb-3">
            <input id="TareaNueva" type="text" class="form-control" placeholder="Nueva tarea">
            <button id="AgregarTarea" class="btn btn-primary">Agregar</button>
        </div>
        <div class="d-flex">
            <p>Total: <span class="fw-bold" id="CantidadTareas"></span></p>
            <p class="px-3" >Realizadas: <span class="fw-bold" id="TareasRealizadas"></span></p>
        </div>
        <h6 class="mb-3 mt-2">ID | Tareas</h6>
        <ul class="list-group" id="ListaTareas"></ul>
    </div>
</div>
<script src="assets/Js/Ordenes.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
